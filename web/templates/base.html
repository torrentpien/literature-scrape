<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}學術期刊摘要系統{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="nav-icon">&#x1D4AE;</span> 學術期刊 PDF 抓取與摘要系統
      </a>
      <div class="nav-links">
        <a href="/">儀表板</a>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>Literature Scraper &mdash; 資料來源：CrossRef / OpenAlex / SAGE Publications</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
